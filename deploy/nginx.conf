# Beyond Classroom backend — nginx reverse proxy (HTTP :80 → Node :5000)
# Large client_max_body_size supports document uploads; tune down once uploads
# stream to S3 as multipart (they no longer need base64 JSON bodies).
server {
    listen 80;
    server_name _;

    client_max_body_size 60m;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

# After DNS points a domain here, add HTTPS with:
#   sudo apt-get install -y certbot python3-certbot-nginx
#   sudo certbot --nginx -d api.yourdomain.com
